<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Aperture — the one</title>
<style>
  :root{
    --paper:#FAF7F1; --paper2:#F2EDE3; --ink:#211E1A; --muted:#8A8377; --line:#3A352E;
    --grid:#E7E1D6; --card:#FFFDF8; --hair:#E3DCCE;
    --client:#0E8388; --api:#3A47B0; --async:#7A4FBF; --data:#B5641F; --notify:#B23A55;
    --live:#2E7D52; --bytes:#8a5a1f; --err:#C0392B; --warn:#C97A12;
    --serif: "Iowan Old Style","Palatino Linotype",Palatino,Georgia,ui-serif,serif;
    --mono: ui-monospace,"SF Mono",Menlo,"Cascadia Mono",Consolas,monospace;
    --sans: system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
  /* ---- slim top bar ---- */
  .bar{flex:none;display:flex;align-items:center;gap:14px;padding:8px 14px;border-bottom:1px solid var(--hair);flex-wrap:wrap}
  .brand{font-family:var(--serif);font-size:18px;font-weight:600;letter-spacing:-.01em;white-space:nowrap}
  .brand em{font-style:italic;color:var(--data)}
  .views{display:flex;gap:5px}
  .vtab{font-family:var(--mono);font-size:12px;padding:6px 12px;border:1px solid var(--ink);border-radius:999px;background:transparent;color:var(--ink);cursor:pointer;transition:background-color .15s,color .15s,transform .15s}
  .vtab:active{transform:scale(.96)}
  @media(hover:hover){.vtab:hover{background:var(--paper2)}}
  .vtab[aria-sel="true"]{background:var(--ink);color:var(--paper)}
  .layers{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap}
  .layers[hidden]{display:none}
  .lbtn{font-family:var(--mono);font-size:11px;padding:5px 10px;border:1px solid var(--hair);border-radius:8px;background:var(--card);color:#5e574b;cursor:pointer;transition:background-color .15s,border-color .15s}
  .lbtn .k{color:var(--muted);margin-right:5px}
  @media(hover:hover){.lbtn:hover{background:var(--paper2)}}
  .lbtn[aria-sel="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .lbtn[aria-sel="true"] .k{color:#b9b0a0}
  .hint{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-left:6px;white-space:nowrap}
  /* ---- stage ---- */
  .stage{position:relative;flex:1;min-height:0;background:radial-gradient(var(--grid) 1.05px,transparent 1.05px);background-size:22px 22px;background-color:var(--card)}
  .stage svg{position:absolute;inset:0;width:100%;height:100%}
  /* svg text */
  .ntitle{font-family:var(--sans);font-weight:600;font-size:13px;fill:var(--ink)}
  .nsub{font-family:var(--mono);font-size:9px;fill:var(--muted)}
  .ntag{font-family:var(--mono);font-size:9px;font-weight:600}
  .elbl{font-family:var(--mono);font-size:9.5px}
  .buslbl{font-family:var(--mono);font-size:11.5px;font-weight:600;fill:var(--async)}
  .axis{font-family:var(--mono);font-size:10px;letter-spacing:.14em;fill:var(--muted);text-transform:uppercase}
  .seqh{font-family:var(--sans);font-weight:600;font-size:12px;fill:var(--ink)}
  .statelbl{font-family:var(--serif);font-weight:600;font-size:14px;fill:var(--ink)}
  .node{cursor:pointer;transition:opacity .2s}
  .edge{transition:opacity .2s,stroke-width .15s}
  .node.planned{opacity:.5} .edge.planned{opacity:.42}
  .focusing .node:not(.hot):not(.near){opacity:.16}
  .focusing .edge:not(.hot){opacity:.08}
  .focusing .elbl-g:not(.hot){opacity:.08}
  .edge.hot{stroke-width:2.7}
  @media(hover:hover){.node.hot rect,.node.hot .pill{stroke-width:2.4}}
  /* lineage */
  .fld{cursor:pointer;transition:opacity .2s}
  .lineage.focusing .fld:not(.up):not(.down):not(.sel){opacity:.14}
  .lineage.focusing .ledge:not(.up):not(.down){opacity:.07}
  .lblbl{font-family:var(--mono);font-size:10.5px;fill:var(--ink)}
  .lgrp{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;fill:var(--muted)}
  .ltrans{font-family:var(--mono);font-size:8.5px;fill:#7a7468}
  .pii{font-family:var(--mono);font-size:8px;font-weight:600;fill:var(--notify)}
  /* drawer */
  #drawer{position:absolute;top:0;right:0;height:100%;width:360px;max-width:88%;background:var(--card);border-left:1px solid var(--hair);box-shadow:-18px 0 40px -32px rgba(60,50,30,.7);transform:translateX(108%);transition:transform .26s cubic-bezier(.23,1,.32,1);z-index:6;display:flex;flex-direction:column}
  #drawer.open{transform:translateX(0)}
  .dwh{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:14px 16px 10px;border-bottom:1px solid var(--hair);flex:none}
  .dwt{font-family:var(--serif);font-weight:600;font-size:18px;line-height:1.05}
  .dws{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px}
  .dwx{border:1px solid var(--hair);background:var(--paper);border-radius:7px;width:28px;height:28px;cursor:pointer;color:#5e574b;flex:none}
  .dwb{padding:10px 16px 18px;overflow-y:auto;flex:1}
  .facet{display:flex;justify-content:space-between;gap:10px;font-family:var(--mono);font-size:11px;padding:5px 0;border-bottom:1px dotted #ece6da}
  .facet b{color:var(--muted);font-weight:500}
  .facet span{color:var(--ink);text-align:right}
  .dwsec{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
  pre.code{font-family:var(--mono);font-size:10.5px;line-height:1.5;color:#4a443b;background:var(--paper2);border:1px solid var(--hair);border-radius:8px;padding:9px 11px;margin:0;white-space:pre-wrap}
  .trace{margin-top:14px;width:100%;font-family:var(--mono);font-size:12px;padding:9px;border:1px solid var(--async);color:var(--async);background:var(--card);border-radius:9px;cursor:pointer;transition:background-color .15s}
  @media(hover:hover){.trace:hover{background:#f1ebf8}}
  .badge{font-family:var(--mono);font-size:9px;font-weight:600;padding:2px 7px;border-radius:5px}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}#drawer{transition:opacity .2s!important;transform:none;opacity:0}#drawer.open{opacity:1}}
</style>

<script>
const VB_W=1280, VB_H=720;
const REDUCE=matchMedia('(prefers-reduced-motion: reduce)').matches;
const CAT={client:'var(--client)',edge:'var(--client)',svc:'var(--api)',store:'var(--data)',broker:'var(--async)'};
const TINT={client:'#E1F0EF',edge:'#E1F0EF',svc:'#E6E8F6',store:'#F6ECDD',broker:'#EDE6F7'};
function rectExit(n,tx,ty){const w=n.w,h=n.h,dx=tx-n.x,dy=ty-n.y,hw=w/2,hh=h/2;if(!dx&&!dy)return{x:n.x,y:n.y};const sx=dx?hw/Math.abs(dx):1e9,sy=dy?hh/Math.abs(dy):1e9,s=Math.min(sx,sy);return{x:n.x+dx*s,y:n.y+dy*s}}
function bez(p1,c1,c2,p2,t){const m=1-t;return{x:m*m*m*p1.x+3*m*m*t*c1.x+3*m*t*t*c2.x+t*t*t*p2.x,y:m*m*m*p1.y+3*m*m*t*c1.y+3*m*t*t*c2.y+t*t*t*p2.y}}
function mk(id,c){return '<marker id="'+id+'" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="'+c+'"/></marker>'}
// one arrowhead, inheriting each edge's stroke (incl. the active-layer recolour) via context-stroke
const DEFS='<defs>'+mk('ar','context-stroke')+
 '<filter id="sf" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4a3f25" flood-opacity="0.15"/></filter></defs>';

/* ===================== model (injected) + builders =====================
   The renderer is the SPINE: it reads ONE system-model JSON (the <script id="cartograph-model">
   block below) and renders every view. To diagram a new project you produce only that model;
   you never edit this file. Schema + tuple order: see MODEL.md. */
const MODEL=JSON.parse(document.getElementById('cartograph-model').textContent);
const TX={rest:{c:'var(--client)',l:'REST'},grpc:{c:'var(--api)',l:'gRPC'},kafka:{c:'var(--async)',l:'Avro'},sql:{c:'var(--data)',l:'SQL'},bytes:{c:'var(--bytes)',l:'bytes'},cache:{c:'#c08a3a',l:'cache'}};
// nodes size to their own text (real labels overflow a fixed width) — see DESIGN.md
const _mc=document.createElement('canvas').getContext('2d');
function measure(t,f){_mc.font=f;return _mc.measureText(t).width}
function nodeWidth(name,team,tag){
  const ttl=22+measure(name,'600 13px system-ui,sans-serif')+12;
  const sub=12+measure(team,'9px ui-monospace,monospace')+(tag?14+measure(tag,'600 9px ui-monospace,monospace'):0)+10;
  return Math.max(132,Math.ceil(Math.max(ttl,sub)));
}
const N=(id,x,y,role,name,team,o={})=>({id,x,y,role,name,team,w:(role==='broker'&&o.bus)?880:nodeWidth(name,team,o.tag||''),h:role==='broker'?44:50,
  dur:o.dur||'',ddd:o.ddd||team,tier:o.tier||'p1',tag:o.tag||'',bus:!!o.bus,state:o.state||''});
const E=(f,t,tx,a,dl,co,st,cr,pl)=>({f,t,tx,a,dl,co,st,cr,pl});  // field 6 = state: 0 current, "planned" ghosted
// fallback role-tiered auto-layout for nodes the model left unplaced (x/y null)
function autoLayout(nodes){
  if(nodes.every(n=>n.x!=null&&n.y!=null)) return nodes;
  const order=['client','edge','svc','broker','store'],groups={};
  nodes.forEach(n=>{(groups[n.role]=groups[n.role]||[]).push(n)});
  const colW=(VB_W-180)/Math.max(1,order.length-1);
  order.forEach((r,ci)=>{const g=groups[r]||[],cx=90+ci*colW;
    g.forEach((n,i)=>{if(n.x==null)n.x=cx;if(n.y==null)n.y=(VB_H-100)/(g.length+1)*(i+1)+50;});});
  nodes.forEach(n=>{if(n.x==null)n.x=VB_W/2;if(n.y==null)n.y=VB_H/2;});
  return nodes;
}
const NODES=autoLayout(MODEL.nodes.map(a=>N(...a)));
const byId=id=>NODES.find(n=>n.id===id);
const EDGES=MODEL.edges.map(a=>E(...a));
function nodeDur(n){return {sot:'source of truth',derived:'derived',ephemeral:'ephemeral'}[n.dur]||'stateless'}

/* ---- the six scan layers (one at a time). transport/sync-async are always-on base. ---- */
const COLORS={
  delivery:{'exactly-once':'var(--live)','at-least-once':'var(--warn)','best-effort':'var(--err)'},
  consistency:{'strong':'var(--live)','ryw':'var(--api)','eventual':'var(--warn)','stale':'var(--err)'},
  durability:{'source of truth':'var(--live)','derived':'var(--data)','ephemeral':'var(--muted)','stateless':'var(--muted)'},
  sensitivity:{'PII':'var(--notify)','—':'var(--muted)'},
  criticality:{'p0':'var(--err)','p1':'var(--warn)','best':'var(--muted)'},
};
const LAYERS=[
  {k:'transport',kind:'edge',label:'Transport',val:e=>TX[e.tx].l,col:e=>TX[e.tx].c,hint:'protocol + wire format on each edge'},
  {k:'delivery',kind:'edge',label:'Delivery',val:e=>e.dl,col:e=>COLORS.delivery[e.dl],hint:'delivery guarantee — the 3am failure axis'},
  {k:'consistency',kind:'edge',label:'Consistency',val:e=>e.co,col:e=>COLORS.consistency[e.co],hint:'strong / read-your-writes / eventual / stale'},
  {k:'criticality',kind:'edge',label:'Criticality',val:e=>e.cr,col:e=>COLORS.criticality[e.cr],hint:'P0 critical path vs best-effort'},
  {k:'durability',kind:'node',label:'Durability',val:n=>nodeDur(n),col:n=>COLORS.durability[nodeDur(n)],hint:'source of truth vs derived vs ephemeral'},
  {k:'team',kind:'node',label:'Team',val:n=>n.team,col:n=>teamColor(n.team),hint:'owning team per service'},
];
// Team layer: a deterministic categorical colour per team (model may override via meta.teamColours)
const TEAMRAMP=['#3A47B0','#0E8388','#B5641F','#7A4FBF','#B23A55','#2E7D52','#C97A12','#5B6470'];
const TEAMCOL=(MODEL.meta&&MODEL.meta.teamColours)||{};
function teamColor(t){if(TEAMCOL[t])return TEAMCOL[t];let h=0;for(let i=0;i<t.length;i++)h=(h*31+t.charCodeAt(i))>>>0;return TEAMRAMP[h%TEAMRAMP.length]}
// de-clutter: hide edge labels whose value is a dominant one (show only the exceptions)
const SUPPRESS=new Set((MODEL.meta&&MODEL.meta.suppressLabel)||[]);
let activeLayer='transport';

/* ===================== MAP view ===================== */
function nodeSVG(n){
  const c=CAT[n.role],x=n.x-n.w/2,y=n.y-n.h/2;
  if(n.role==='broker'){
    return '<g class="node" data-id="'+n.id+'"><title>'+n.name+'</title><rect x="'+x+'" y="'+y+'" width="'+n.w+'" height="'+n.h+'" rx="10" fill="'+TINT.broker+'" stroke="'+c+'" stroke-width="1.5" filter="url(#sf)"/><text x="'+n.x+'" y="'+(n.y+4)+'" text-anchor="middle" class="buslbl">'+n.name+'</text></g>';
  }
  const tag=n.tag?'<text x="'+(x+n.w-9)+'" y="'+(y+37)+'" text-anchor="end" class="ntag" fill="'+c+'">'+n.tag+'</text>':'';
  const planned=n.state==='planned';
  const pdash=planned?' stroke-dasharray="5 3"':'';
  const pbadge=planned?'<text x="'+(x+n.w/2)+'" y="'+(y-5)+'" text-anchor="middle" class="ntag" fill="var(--muted)">planned</text>':'';
  return '<g class="node'+(planned?' planned':'')+'" data-id="'+n.id+'"><title>'+n.name+' — '+n.team+(planned?' (planned)':'')+'</title>'+pbadge+
    '<rect x="'+x+'" y="'+y+'" width="'+n.w+'" height="'+n.h+'" rx="'+(n.role==='store'?7:10)+'" fill="'+TINT[n.role]+'" stroke="'+c+'" stroke-width="1.4"'+pdash+' filter="url(#sf)"/>'+
    '<circle cx="'+(x+12)+'" cy="'+(y+15)+'" r="4" fill="'+c+'"/>'+
    '<text x="'+(x+22)+'" y="'+(y+19)+'" class="ntitle">'+n.name+'</text>'+
    '<text x="'+(x+12)+'" y="'+(y+37)+'" class="nsub" data-sub>'+n.team+'</text>'+tag+
    '<text x="'+(x+12)+'" y="'+(y+37)+'" class="ntag" data-ntag style="display:none"></text></g>';
}
function edgeSVG(e,i){
  const a=byId(e.f),b=byId(e.t);
  const p1=rectExit(a,b.x,b.y),p2=rectExit(b,a.x,a.y);
  const hb=Math.abs(b.x-a.x)>=Math.abs(b.y-a.y);
  let c1,c2;if(hb){const mx=(p1.x+p2.x)/2;c1={x:mx,y:p1.y};c2={x:mx,y:p2.y}}else{const my=(p1.y+p2.y)/2;c1={x:p1.x,y:my};c2={x:p2.x,y:my}}
  const d='M'+p1.x.toFixed(1)+','+p1.y.toFixed(1)+' C'+c1.x.toFixed(1)+','+c1.y.toFixed(1)+' '+c2.x.toFixed(1)+','+c2.y.toFixed(1)+' '+p2.x.toFixed(1)+','+p2.y.toFixed(1);
  const planned=e.st==='planned';
  const dash=e.a?'stroke-dasharray="6 5"':(planned?'stroke-dasharray="2 4"':'');
  const mid=bez(p1,c1,c2,p2,.5);
  const pid='e'+i;
  return {path:'<path id="'+pid+'" class="edge'+(planned?' planned':'')+'" data-from="'+e.f+'" data-to="'+e.t+'" data-i="'+i+'" d="'+d+'" fill="none" stroke="var(--line)" stroke-width="1.5" '+dash+' marker-end="url(#ar)"/>',
    lbl:'<g class="elbl-g" data-i="'+i+'" data-from="'+e.f+'" data-to="'+e.t+'"><rect data-bg x="'+(mid.x-30)+'" y="'+(mid.y-8)+'" width="60" height="15" rx="4" fill="var(--card)" opacity="0"/><text data-vt x="'+mid.x.toFixed(1)+'" y="'+(mid.y+3).toFixed(1)+'" text-anchor="middle" class="elbl"></text></g>'};
}
function renderMap(){
  let edges='',lbls='';EDGES.forEach((e,i)=>{const o=edgeSVG(e,i);edges+=o.path;lbls+=o.lbl});
  let nodes='';NODES.forEach(n=>nodes+=nodeSVG(n));
  return '<svg class="focus-host" viewBox="0 0 '+VB_W+' '+VB_H+'">'+DEFS+edges+lbls+nodes+'</svg>';
}
function applyLayer(k){
  activeLayer=k;
  [...document.querySelectorAll('#layers .lbtn')].forEach(b=>b.setAttribute('aria-sel',b.dataset.k===k));
  const L=LAYERS.find(l=>l.k===k);
  document.getElementById('hint').textContent=L.hint;
  const svg=document.querySelector('#mount svg');if(!svg)return;
  // edges
  svg.querySelectorAll('.edge').forEach(p=>{
    const e=EDGES[+p.dataset.i];
    const col=L.kind==='edge'?L.col(e):'var(--muted)';
    p.setAttribute('stroke',col);
    p.style.opacity=L.kind==='edge'?'1':'.25';
  });
  svg.querySelectorAll('.elbl-g').forEach(g=>{
    const e=EDGES[+g.dataset.i];const t=g.querySelector('[data-vt]');const bg=g.querySelector('[data-bg]');
    if(L.kind==='edge'){const raw=L.val(e),v=(raw==='—'||SUPPRESS.has(raw))?'':raw,col=L.col(e);t.textContent=v;t.setAttribute('fill',col);t.setAttribute('paint-order','stroke');t.setAttribute('stroke','var(--card)');t.setAttribute('stroke-width','3');const w=v.length*5.8+8;bg.setAttribute('x',(+t.getAttribute('x')-w/2));bg.setAttribute('width',w);bg.setAttribute('opacity','.0');}
    else{t.textContent='';}
  });
  // nodes
  svg.querySelectorAll('.node[data-id]').forEach(g=>{
    const n=byId(g.dataset.id);if(!n||n.role==='broker')return;
    const rect=g.querySelector('rect');const sub=g.querySelector('[data-sub]');const nt=g.querySelector('[data-ntag]');
    if(L.kind==='node'){const v=L.val(n),col=L.col(n);rect.setAttribute('stroke',col);nt.textContent=v;nt.setAttribute('fill',col);nt.style.display='';sub.style.display='none';}
    else{rect.setAttribute('stroke',CAT[n.role]);nt.style.display='none';sub.style.display='';}
  });
}

/* ===================== drill drawer ===================== */
const drawer=document.getElementById('drawer'),dwt=document.getElementById('dwt'),dws=document.getElementById('dws'),dwb=document.getElementById('dwb');
function closeDrawer(){drawer.classList.remove('open');unpin&&unpin()}
document.getElementById('dwx').onclick=closeDrawer;
function facet(k,v){return '<div class="facet"><b>'+k+'</b><span>'+v+'</span></div>'}
function openNode(id){
  const n=byId(id);const ins=EDGES.filter(e=>e.t===id),outs=EDGES.filter(e=>e.f===id);
  dwt.textContent=n.name;dws.textContent=({client:'client',edge:'edge',svc:'service',store:'datastore',broker:'event broker'}[n.role])+' · '+n.team;
  let b=facet('owning team',n.team)+facet('durability',nodeDur(n))+facet('criticality (max edge)',[...ins,...outs].some(e=>e.cr==='p0')?'p0 critical':'p1')+facet('DDD context',n.ddd);
  b+='<div class="dwsec">outgoing — what it sends</div>'+outs.map(e=>'<div class="facet"><b>→ '+byId(e.t).name+'</b><span>'+TX[e.tx].l+' · '+e.dl+'</span></div>').join('');
  b+='<div class="dwsec">incoming</div>'+ins.map(e=>'<div class="facet"><b>← '+byId(e.f).name+'</b><span>'+TX[e.tx].l+'</span></div>').join('');
  if(LINEAGE_NODES[id]) b+='<button class="trace" data-node="'+id+'">⤳ trace this data’s lineage</button>';
  dwb.innerHTML=b;dwb.scrollTop=0;drawer.classList.add('open');wireTrace();
}
function openEdge(i){
  const e=EDGES[i],a=byId(e.f),b=byId(e.t);
  dwt.textContent=a.name+' → '+b.name;dws.textContent=TX[e.tx].l+' · '+(e.a?'async':'sync');
  let h=facet('transport',TX[e.tx].l)+facet('sync / async',e.a?'async':'sync')+facet('delivery',e.dl)+facet('consistency',e.co)+facet('criticality',e.cr)+facet('DDD',a.ddd===b.ddd?'intra-context':'cross-service');
  h+='<div class="dwsec">payload on the wire</div><pre class="code">'+e.pl.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</pre>';
  h+='<button class="trace" data-edge="'+i+'">⤳ trace this data’s lineage</button>';
  dwb.innerHTML=h;dwb.scrollTop=0;drawer.classList.add('open');wireTrace();
}
function wireTrace(){
  dwb.querySelectorAll('.trace').forEach(btn=>btn.onclick=()=>{
    const seed=btn.dataset.node?LINEAGE_NODES[btn.dataset.node]:(btn.dataset.edge?lineageSeedForEdge(+btn.dataset.edge):null);
    closeDrawer();switchView('lineage');if(seed)setTimeout(()=>focusField(seed),60);
  });
}
// which lineage field best represents a node / edge
const LINEAGE_NODES=(MODEL.lineage&&MODEL.lineage.nodeSeeds)||{};
function lineageSeedForEdge(i){const e=EDGES[i];return LINEAGE_NODES[e.f]||LINEAGE_NODES[e.t]||'photos.geom'}

/* ===================== LINEAGE view (column-level) ===================== */
// groups left→right; each field belongs to a stage
const LG=(MODEL.lineage&&MODEL.lineage.groups)||[];
function fieldW(f){return f.label.length*6.6+10}
const LF=(id,grp,y,label,pii)=>({id,grp,y,label,pii:!!pii});
const FIELDS=((MODEL.lineage&&MODEL.lineage.fields)||[]).map(a=>LF(...a));
const fById=id=>FIELDS.find(f=>f.id===id);
const D=(from,to,t)=>({from,to,t});
const DERIVS=((MODEL.lineage&&MODEL.lineage.derivations)||[]).map(a=>D(...a));
function lineageEdge(from,to){
  const a=fById(from),b=fById(to);if(!a||!b)return null;
  const ga=LG.find(g=>g.id===a.grp),gb=LG.find(g=>g.id===b.grp);
  if(a.grp===b.grp){                       // same column: route down a left gutter, don't exit and loop back
    const lx=ga.x-4, gx=ga.x-24, y1=a.y, y2=b.y;
    return {d:'M'+lx+','+y1+' C'+gx+','+y1+' '+gx+','+y2+' '+lx+','+y2, x1:lx,y1,x2:lx,y2, mx:gx};
  }
  const x1=ga.x-4+fieldW(a)+2, y1=a.y;
  const x2=gb.x-10, y2=b.y;
  const mx=(x1+x2)/2;
  return {d:'M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2,x1,y1,x2,y2,mx};
}
function renderLineage(){
  const maxX=LG.length?Math.max(...LG.map(g=>g.x+Math.max(0,...FIELDS.filter(f=>f.grp===g.id).map(fieldW)))):900;
  const maxY=FIELDS.length?Math.max(...FIELDS.map(f=>f.y)):360;
  const VW=Math.max(900,Math.ceil(maxX+30)), VH=Math.max(360,Math.ceil(maxY+50));   // fit the viewBox to content
  let s='<svg class="lineage" viewBox="0 0 '+VW+' '+VH+'">'+DEFS;
  LG.forEach(g=>{s+='<text x="'+(g.x-4)+'" y="100" class="lgrp">'+g.label+'</text><line x1="'+(g.x-14)+'" y1="110" x2="'+(g.x-14)+'" y2="'+(VH-34)+'" stroke="var(--hair)" stroke-dasharray="2 7"/>'});
  DERIVS.forEach((d,i)=>{const e=lineageEdge(d.from,d.to);if(!e)return;
    s+='<g class="ledge" data-from="'+d.from+'" data-to="'+d.to+'"><path d="'+e.d+'" fill="none" stroke="var(--line)" stroke-width="1.3" opacity=".5" marker-end="url(#ar)"/>'+
      '<rect x="'+(e.mx-d.t.length*2.7-3)+'" y="'+((e.y1+e.y2)/2-11)+'" width="'+(d.t.length*5.4+6)+'" height="12" fill="var(--card)" opacity=".85"/>'+
      '<text x="'+e.mx+'" y="'+((e.y1+e.y2)/2-3)+'" text-anchor="middle" class="ltrans">'+d.t+'</text></g>';
  });
  FIELDS.forEach(f=>{const g=LG.find(G=>G.id===f.grp);const w=fieldW(f);
    s+='<g class="fld" data-id="'+f.id+'"><rect x="'+(g.x-4)+'" y="'+(f.y-13)+'" width="'+w+'" height="20" rx="6" fill="var(--card)" stroke="var(--hair)" stroke-width="1.2"/>'+
      '<text x="'+(g.x+4)+'" y="'+(f.y+1)+'" class="lblbl">'+f.label+'</text></g>';
  });
  s+='<text x="66" y="'+(VH-12)+'" class="axis">click any field → trace upstream sources + downstream consumers</text>';
  return s+'</svg>';
}
function focusField(id){
  const svg=document.querySelector('#mount svg.lineage');if(!svg)return;
  svg.classList.remove('focusing');svg.querySelectorAll('.up,.down,.sel').forEach(e=>e.classList.remove('up','down','sel'));
  if(!id)return;
  svg.classList.add('focusing');
  const up=new Set(),down=new Set();
  (function goUp(x){DERIVS.filter(d=>d.to===x).forEach(d=>{if(!up.has(d.from)){up.add(d.from);goUp(d.from)}})})(id);
  (function goDown(x){DERIVS.filter(d=>d.from===x).forEach(d=>{if(!down.has(d.to)){down.add(d.to);goDown(d.to)}})})(id);
  svg.querySelectorAll('.fld').forEach(g=>{const fid=g.dataset.id;if(fid===id)g.classList.add('sel');else if(up.has(fid))g.classList.add('up');else if(down.has(fid))g.classList.add('down')});
  svg.querySelectorAll('.ledge').forEach(g=>{const f=g.dataset.from,t=g.dataset.to;
    const onUp=(up.has(f)||f===id)&&(up.has(t)||t===id);const onDown=(down.has(f)||f===id)&&(down.has(t)||t===id);
    if(onUp)g.classList.add('up');if(onDown)g.classList.add('down');});
  // color highlighted fields
  svg.querySelectorAll('.fld.sel rect').forEach(r=>{r.setAttribute('stroke','var(--ink)');r.setAttribute('stroke-width','2.2')});
  svg.querySelectorAll('.fld.up rect').forEach(r=>{r.setAttribute('stroke','var(--api)');r.setAttribute('stroke-width','1.8')});
  svg.querySelectorAll('.fld.down rect').forEach(r=>{r.setAttribute('stroke','var(--data)');r.setAttribute('stroke-width','1.8')});
  svg.querySelectorAll('.ledge.up path').forEach(p=>{p.setAttribute('stroke','var(--api)');p.setAttribute('stroke-width','2');p.setAttribute('opacity','1')});
  svg.querySelectorAll('.ledge.down path').forEach(p=>{p.setAttribute('stroke','var(--data)');p.setAttribute('stroke-width','2');p.setAttribute('opacity','1')});
}

/* ===================== SEQUENCE view ===================== */
// one or many critical-path flows: model may give `sequences:[...]` or a single `sequence:{}`
const SEQS=MODEL.sequences||(MODEL.sequence?[MODEL.sequence]:[]);
let activeSeq=0;
const ROLECOL={client:'var(--client)',svc:'var(--api)',store:'var(--data)',broker:'var(--async)',async:'var(--async)',notify:'var(--notify)'};
function renderSequence(){
  const SQ=SEQS[activeSeq]||{}, SP=SQ.participants||[], SM=SQ.messages||[];
  const padL=90,span=1100,step=span/Math.max(1,SP.length-1),X={};SP.forEach((p,i)=>X[p[0]]=padL+i*step);
  const DIV=(SQ.dividerIndex!=null)?SQ.dividerIndex:null;   // optional async divider — per-flow, no baked-in index
  const yOf=i=>150+i*30+(DIV!=null&&i>=DIV?34:0),top=110,bot=690;
  let s='<svg viewBox="0 0 1280 720">'+DEFS;
  SP.forEach(p=>s+='<line x1="'+X[p[0]]+'" y1="'+top+'" x2="'+X[p[0]]+'" y2="'+bot+'" stroke="var(--hair)" stroke-dasharray="2 6"/>');
  if(DIV!=null&&DIV>0&&DIV<SM.length){const div=yOf(DIV-1)+(yOf(DIV)-yOf(DIV-1))/2,lbl=SQ.dividerLabel||'async · later',w=lbl.length*6+40;
    s+='<line x1="60" y1="'+div+'" x2="1220" y2="'+div+'" stroke="var(--async)" stroke-dasharray="3 5" opacity=".5"/><rect x="'+(640-w/2)+'" y="'+(div-9)+'" width="'+w+'" height="18" fill="var(--card)"/><text x="640" y="'+(div+3)+'" text-anchor="middle" class="axis">'+lbl+'</text>';}
  SM.forEach((m,i)=>{const y=yOf(i),x1=X[m[0]],x2=X[m[1]],ret=m[3],as=m[4];const col=as?'var(--async)':'var(--line)';const dash=(ret||as)?'stroke-dasharray="5 5"':'';
    s+='<g><line x1="'+x1+'" y1="'+y+'" x2="'+x2+'" y2="'+y+'" stroke="'+col+'" stroke-width="1.7" '+dash+' marker-end="url(#ar)"/><text x="'+((x1+x2)/2)+'" y="'+(y-6)+'" text-anchor="middle" class="elbl" fill="#4a443b">'+(i+1)+'. '+m[2]+'</text><circle cx="'+x1+'" cy="'+y+'" r="2.5" fill="'+col+'"/></g>';
  });
  SP.forEach(p=>{const x=X[p[0]],c=ROLECOL[p[2]];s+='<g><rect x="'+(x-50)+'" y="'+(top-44)+'" width="100" height="32" rx="8" fill="var(--card)" stroke="'+c+'" stroke-width="1.5" filter="url(#sf)"/><circle cx="'+(x-36)+'" cy="'+(top-28)+'" r="4" fill="'+c+'"/><text x="'+(x+6)+'" y="'+(top-23)+'" text-anchor="middle" class="seqh">'+p[1]+'</text></g>'});
  s+='<text x="40" y="118" class="axis" transform="rotate(90 40 118)">TIME →</text>';
  return s+'</svg>';
}

/* ===================== LIFECYCLE view ===================== */
const ST=(id,x,y,c,name,sub,o={})=>({id,x,y,c,name,sub,w:(o&&o.w)||140,dbl:o&&o.dbl});
const STATES=((MODEL.lifecycle&&MODEL.lifecycle.states)||[]).map(a=>ST(...a));
const sById=id=>STATES.find(s=>s.id===id);
const TR=(MODEL.lifecycle&&MODEL.lifecycle.transitions)||[];
function renderLifecycle(){
  let s='<svg viewBox="0 0 1280 640">'+DEFS;
  s+='<circle cx="92" cy="200" r="8" fill="var(--ink)"/><path d="M100,200 L'+(200-72)+',200" fill="none" stroke="var(--line)" stroke-width="1.7" marker-end="url(#ar)"/><text x="92" y="182" text-anchor="middle" class="elbl" fill="#4a443b">start</text>';
  TR.forEach(t=>{const a=sById(t[0]),b=sById(t[1]);const A={x:a.x,y:a.y,w:a.w,h:46},B={x:b.x,y:b.y,w:b.w,h:46};
    const p1=rectExit(A,b.x,b.y),p2=rectExit(B,a.x,a.y);const hb=Math.abs(b.x-a.x)>=Math.abs(b.y-a.y);
    let c1,c2;if(t[3]==='h'||(t[3]!=='v'&&hb)){const mx=(p1.x+p2.x)/2;c1={x:mx,y:p1.y};c2={x:mx,y:p2.y}}else{const my=(p1.y+p2.y)/2;c1={x:p1.x,y:my};c2={x:p2.x,y:my}}

  });

    const ring=st.dbl?'<rect x="'+(x-5)+'" y="'+(y-5)+'" width="'+(st.w+10)+'" height="56" rx="28" fill="none" stroke="'+st.c+'" stroke-width="1.1" opacity=".5"/>':'';
    s+='<g>'+ring+'<rect class="pill" x="'+x+'" y="'+y+'" width="'+st.w+'" height="46" rx="23" fill="var(--card)" stroke="'+st.c+'" stroke-width="1.7" filter="url(#sf)"/><text x="'+st.x+'" y="'+(st.y-2)+'" text-anchor="middle" class="statelbl">'+st.name+'</text><text x="'+st.x+'" y="'+(st.y+13)+'" text-anchor="middle" class="nsub">'+st.sub+'</text></g>';
  });
  return s+'</svg>';
}

/* ===================== view switch + wiring ===================== */
let unpin=null;
const VIEWS={
  map:{label:'Map',render:renderMap,layers:true,hint:'hover to trace · click a node or edge to drill · then ⤳ trace its lineage'},
  sequence:{label:'Sequence',render:renderSequence,hint:'the upload critical path, in time — happy path + the async tail'},
  lifecycle:{label:'Lifecycle',render:renderLifecycle,hint:'the photo as a state machine — including failure & retry'},
  lineage:{label:'Lineage',render:renderLineage,hint:'column-level data lineage — click a field to trace it'},
};
const ORDER=['map','sequence','lifecycle','lineage'].filter(k=>k==='map'||(k==='sequence'&&SEQS.length)||(k==='lifecycle'&&STATES.length)||(k==='lineage'&&FIELDS.length));
let active='map';
const mount=document.getElementById('mount'),layersEl=document.getElementById('layers'),viewsEl=document.getElementById('views'),hintEl=document.getElementById('hint'),flowsEl=document.getElementById('flows');
function buildFlows(on){
  if(!on||SEQS.length<2){flowsEl.hidden=true;flowsEl.innerHTML='';return;}
  flowsEl.hidden=false;flowsEl.innerHTML='';
  SEQS.forEach((sq,i)=>{const b=document.createElement('button');b.className='lbtn';b.textContent=sq.name||('flow '+(i+1));b.setAttribute('aria-sel',i===activeSeq);
    b.onclick=()=>{activeSeq=i;mount.innerHTML=VIEWS.sequence.render();buildFlows(true);};flowsEl.appendChild(b);});
}
document.getElementById('brand').innerHTML=((MODEL.meta&&MODEL.meta.name)||'System')+'<em>.</em>';
document.title=((MODEL.meta&&MODEL.meta.name)||'cartograph')+' — cartograph';
ORDER.forEach(k=>{const b=document.createElement('button');b.className='vtab';b.dataset.k=k;b.textContent=VIEWS[k].label;b.onclick=()=>switchView(k);viewsEl.appendChild(b)});
LAYERS.forEach(l=>{const b=document.createElement('button');b.className='lbtn';b.dataset.k=l.k;b.innerHTML='<span class="k">'+(LAYERS.indexOf(l)+1)+'</span>'+l.label;b.onclick=()=>applyLayer(l.k);layersEl.appendChild(b)});

function wireMapInteractions(){
  const svg=mount.querySelector('svg.focus-host');if(!svg)return;
  let pinned=null;
  const clear=()=>{svg.classList.remove('focusing');svg.querySelectorAll('.hot,.near').forEach(e=>e.classList.remove('hot','near'))};
  const spot=id=>{clear();svg.classList.add('focusing');svg.querySelectorAll('[data-id="'+id+'"]').forEach(e=>e.classList.add('hot'));const near=new Set();svg.querySelectorAll('[data-from="'+id+'"],[data-to="'+id+'"]').forEach(e=>{e.classList.add('hot');const f=e.getAttribute('data-from'),t=e.getAttribute('data-to');near.add(f===id?t:f)});near.forEach(nid=>svg.querySelectorAll('[data-id="'+nid+'"]').forEach(e=>e.classList.add('near')))};
  unpin=()=>{pinned=null;clear()};
  svg.querySelectorAll('.node[data-id]').forEach(g=>{const id=g.dataset.id;
    g.addEventListener('mouseenter',()=>{if(!pinned)spot(id)});
    g.addEventListener('mouseleave',()=>{if(!pinned)clear()});
    g.addEventListener('click',ev=>{ev.stopPropagation();pinned=id;spot(id);openNode(id)});
  });
  svg.querySelectorAll('.edge').forEach(p=>{p.style.cursor='pointer';p.addEventListener('click',ev=>{ev.stopPropagation();openEdge(+p.dataset.i)})});
  svg.addEventListener('click',()=>{if(pinned)closeDrawer()});
}
function wireLineage(){
  const svg=mount.querySelector('svg.lineage');if(!svg)return;
  svg.querySelectorAll('.fld').forEach(g=>g.addEventListener('click',()=>focusField(g.dataset.id)));
  svg.addEventListener('click',ev=>{if(ev.target===svg||ev.target.tagName==='line')focusField(null)});
}
function switchView(k){
  active=k;const v=VIEWS[k];
  [...viewsEl.children].forEach(b=>b.setAttribute('aria-sel',b.dataset.k===k));
  closeDrawer();unpin=null;
  mount.innerHTML=v.render();
  layersEl.hidden=!v.layers;
  hintEl.textContent=v.hint;
  buildFlows(k==='sequence');
  if(k==='map'){wireMapInteractions();applyLayer(activeLayer);}
  if(k==='lineage'){wireLineage();}
}
document.addEventListener('keydown',e=>{
  if(/^[1-4]$/.test(e.key)){switchView(ORDER[+e.key-1]);}
});
switchView('map');
</script>
</body>
</html>
